<!DOCTYPE html>
<html>
    <head>
        <title>Contact Page</title>
    </head>
    <body>
        <form action="">
            <table border="0" cellspacing="0" cellpadding="10">
                <tr>
                    <td>
                        <a href="index.html">Home</a>
                    </td>
                    <td>
                        <a href="product.html">Product</a>
                    </td>
                    <td>
                        <a href="location.html">Location</a>
                    </td>
                    <td>
                        <a href="contact.html">Contact</a>
                    </td>
                </tr>
                <tr>
                    <td colspan="4">
                        <h2>Contact Us</h2>
                        <hr>
                        <table border="0" cellspacing="0" cellpadding="10">
                            <tr>
                                <td><label for="name">Name</label></td>
                                <td><input type="text" id="name"></td>
                            </tr>
                            <tr>
                                <td><label for="email">Email</label></td>
                                <td><input type="text" id="email"></td>
                            </tr>
                            <tr>
                                <td><label for="">Gender</label></td>
                                <td>
                                    <input type="radio" id="male" name="gender"><label for="male">Male</label>
                                    <input type="radio" id="female" name="gender"><label for="female">Female</label>
                                </td>
                            </tr>
                            <tr>
                                <td><label for="">Location</label></td>
                                <td>
                                    <select name="" id="location">
                                        <option value="jakarta">Jakarta</option>
                                        <option value="bandung">Bandung</option>
                                        <option value="bali">Bali</option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td><label for="">Interest</label></td>
                                <td>
                                    <input type="checkbox" name="interest" id="sport"><label for="sport">Sport</label>
                                    <br>
                                    <input type="checkbox" name="interest" id="science"><label for="science">Science</label>
                                    <br>
                                    <input type="checkbox" name="interest" id="entertainment"><label for="entertainment">Entertainment</label>
                                </td>
                            </tr>
                            <tr>
                                <td><label for="comment">Comment</label></td>
                                <td><textarea name="comment" id="comment"></textarea></td>
                            </tr>
                            <tr>
                                <td colspan="2" align="center">
                                    <button type="submit">Submit</button>
                                    <button type="reset">Reset</button>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>

        </form>
    </body>
</html>
