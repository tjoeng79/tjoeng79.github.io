<!DOCTYPE html>
<html>
    <head>
        <title>Contact Page</title>
        <link rel="icon" href="favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="css/contact.css">
    </head>
    <body>
        <div class="container">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="article.html">Article</a></li>
                    <li><a href="location.html">Location</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
            <header></header>
            <main>
                <form action="" method="get">
                <content>
                    <div><label for="name">Name</label></div>
                    <div><input type="text" id="name" name="name" required></div>
                    <div><label for="email">Email</label></div>
                    <div><input type="email" id="email" name="email" required></div>
                    <div><label for="">Entity</label></div>
                    <div>
                        <input type="radio" id="personal" name="entity" value="personal"><label for="personal">Personal</label>
                        <input type="radio" id="business" name="entity" value="business"><label for="business">Business</label>
                    </div>
                    <div><label for="location">Location</label></div>
                    <div>
                        <select name="location" id="location">
                            <option value="Jakarta">Jakarta</option>
                            <option value="Surabaya">Surabaya</option>
                            <option value="Medan">Medan</option>
                            <option value="Bali">Bali</option>
                        </select>
                    </div>
                    <div><label for="">Interest</label></div>
                    <div>
                        <input type="checkbox" name="interest" id="desktop" value="desktop"><label for="desktop">Desktop</label>
                        <br>
                        <input type="checkbox" name="interest" id="web" value="web"><label for="web">Web</label>
                        <br>
                        <input type="checkbox" name="interest" id="mobile" value="mobile"><label for="mobile">Mobile</label>
                    </div>
                    <div><label for="comment">Comment</label></div>
                    <div><textarea name="comment" id="comment" rows="5" cols="40"></textarea></div>
                    <div></div>
                    <div>
                        <button type="submit">SUBMIT</button>
                        <button type="reset">RESET</button>
                    </div>
                </content>
                </form>
            </main>
            <footer>
                <p class="copyright">Copyright@2026</p>
            </footer>
        </div>
    </body>
</html>
