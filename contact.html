<!DOCTYPE html>
<html>
    <head>
        <title>Contact Page</title>
        <link rel="icon" href="favicon.ico" type="image/x-icon">
        <link rel="stylesheet" href="css/contact.css">
    </head>
    <body>
        <div class="container">
            <div class="nav">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="article.html">Article</a></li>
                    <li><a href="location.html">Location</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </div>        
            <div class="header">
            </div>
            <div class="main">
                <form action="get">
                    <table cellspacing="0" cellpadding="10">
                        <tr>
                            <td><label for="name">Name</label></td>
                            <td><input type="text" id="name" name="name" required></td>
                        </tr>   
                        <tr>
                            <td><label for="email">Email</label></td>
                            <td><input type="email" id="email" name="email" required></td>
                        </tr>
                        <tr>
                            <td><label for="">Entity</label></td>
                            <td>
                                <input type="radio" id="personal" name="entity" value="personal"><label for="personal">Personal</label>
                                <input type="radio" id="business" name="entity" value="business"><label for="business">Business</label>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="location">Location</label></td>
                            <td>
                                <select name="location" id="location">
                                    <option value="Jakarta">Jakarta</option>
                                    <option value="Surabaya">Surabaya</option>
                                    <option value="Medan">Medan</option>
                                    <option value="Bali">Bali</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="">Interest</label></td>
                            <td>
                                <input type="checkbox" name="interest" id="desktop" value="desktop"><label for="desktop">Desktop</label>
                                <br>
                                <input type="checkbox" name="interest" id="web" value="web"><label for="web">Web</label>
                                <br>
                                <input type="checkbox" name="interest" id="mobile" value="mobile"><label for="mobile">Mobile</label>
                            </td>
                        </tr>
                        <tr>
                            <td><label for="comment">Comment</label></td>
                            <td><textarea name="comment" id="comment" rows="5" cols="40"></textarea></td>
                        </tr>
                        <tr>
                            <td></td>
                            <td>
                                <button type="submit">SUBMIT</button>
                                <button type="reset">RESET</button>
                            </td>
                        </tr>
                    </table>                        
                </form>
            </div>
            <div class="footer">
                <p class="copyright">Copyright@2026</p>
            </div>
        </div>
    </body>
</html>
