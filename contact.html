<!DOCTYPE html>
<html>
    <head>
        <title>Contact Page</title>
    </head>
    <body>
        <form action="">
            <table border="0" cellspacing="0" cellpadding="10" width="80%" align="center">
                <tr>
                    <td>
                        <a href="index.html">Home</a>
                    </td>
                    <td>
                        <a href="product.html">Product</a>
                    </td>
                    <td>
                        <a href="location.html">Location</a>
                    </td>
                    <td>
                        <a href="contact.html">Contact</a>
                    </td>
                </tr>
                <tr>
                    <td colspan="4">
                        <h2>Contact Us</h2>
                        <hr>
                        <table border="0" cellspacing="0" cellpadding="10">
                            <tr>
                                <td><label for="Name"><b>Name</b></label></td>
                                <td><input type="text" id="Name"></td>
                            </tr>
                            <tr>
                                <td><label for="Email"><b>Email</b></label></td>
                                <td><input type="text" id="Email"></td>
                            </tr>
                            <tr>
                                <td><label for=""><b>Gender</b></label></td>
                                <td>
                                    <input type="radio" id="Male" name="Gender"><label for="Male">Male</label>
                                    <input type="radio" id="Female" name="Gender"><label for="Female">Female</label>
                                </td>
                            </tr>
                            <tr>
                                <td><label for=""><b>Location</b></label></td>
                                <td>
                                    <select name="" id="Location">
                                        <option value="Jakarta">Jakarta</option>
                                        <option value="Surabaya">Surabaya</option>
                                        <option value="Bali">Bali</option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td><label for=""><b>Interest</b></label></td>
                                <td>
                                    <input type="checkbox" name="Interest" id="Desktop"><label for="Desktop">Desktop</label>
                                    <br>
                                    <input type="checkbox" name="Interest" id="Web"><label for="Web">Web</label>
                                    <br>
                                    <input type="checkbox" name="Interest" id="Mobile"><label for="Mobile">Mobile</label>
                                </td>
                            </tr>
                            <tr>
                                <td><label for="Comment"><b>Comment</b></label></td>
                                <td><textarea name="Comment" id="Comment"></textarea></td>
                            </tr>
                            <tr>
                                <td colspan="2" align="center">
                                    <button type="submit">Submit</button>
                                    <button type="reset">Reset</button>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </table>

        </form>
    </body>
</html>
