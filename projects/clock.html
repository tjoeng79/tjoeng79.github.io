<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="stylesheet" href="css/clock.css">
</head>
<body>
    <div class="header">
        <h1>Clock</h1>
    </div>
    <div class="container">
        <div class="clock-area">
            <p id="digitalClock">00:00:00</p>
        </div>
        <div class="timer-area">
            <input type="button" value="Start" id="timerStart">
            <input type="button" value="Reset" id="timerReset">
            <p id="elapsedTime">00:00:00</p>
        </div>
    </div>
    <script src="js/clock.js"></script>
</body>
</html>
