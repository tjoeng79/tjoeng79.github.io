<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="stylesheet" href="css/clock.css">
</head>
<body>
    <header>
        <h1>Clock</h1>
    </header>
    <div class="container">
        <div class="clock-area">
            <p id="clock-info">00:00:00</p>
        </div>
        <div class="timer-area">
            <input type="button" value="Start" id="timer-start">
            <input type="button" value="Stop" id="timer-stop">
            <input type="button" value="Reset" id="timer-reset">
            <p id="timer-info">00:00:00:00</p>
        </div>
    </div>
    <script src="js/clock.js"></script>
</body>
</html>
