<!DOCTYPE html>

    <link rel="stylesheet" href="css/image-gallery.css">
</head>

            <img src="img/gallery3.jpg" class="thumb">
            <img src="img/gallery4.jpg" class="thumb">
            <img src="img/gallery5.jpg" class="thumb">
            <img src="img/gallery6.jpg" class="thumb">
        </div>
    </div>
    <script src="js/image-gallery.js"></script>
</body>
</html>
