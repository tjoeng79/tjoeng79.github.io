<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Cinema</title>
    <link rel="stylesheet" href="css/movie-cinema.css">
</head>
<body>
    <div class="header">
        <h1>Movie Cinema</h1>
    </div>
    <div class="container">
        <div class="movie-card">
            <img src="img/movie-i-am-sam.jpg" alt="I Am Sam" id="card-1">
            <img src="img/movie-bruce-almighty.jpg" alt="Bruce Almighty" id="card-2">
            <img src="img/movie-taken.jpg" alt="Taken" id="card-3">
        </div>
        <div class="movie-info">
            <p id="info-title"></p>
            <p id="info-year"></p>
            <p id="info-genre"></p>
            <p id="info-description"></p>
            <p id="info-director"></p>
            <p id="info-cast"></p>
        </div>
        <div class="seat-layout">
            <div class="seat">1</div>
            <div class="seat">2</div>
            <div class="seat">3</div>
            <div class="seat">4</div>
            <div class="seat">5</div>
            <div class="seat">6</div>
            <div class="seat">7</div>
            <div class="seat">8</div>
            <div class="seat">9</div>
            <div class="seat">10</div>
            <div class="seat">11</div>
            <div class="seat">12</div>
            <div class="seat">13</div>
            <div class="seat">14</div>
            <div class="seat">15</div>
            <div class="seat">16</div>
            <div class="seat">17</div>
            <div class="seat">18</div>
            <div class="seat">19</div>
            <div class="seat">20</div>
        </div>
    </div>
    <script src="js/movie-cinema.js"></script>
</body>
</html>
