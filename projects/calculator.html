<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <link rel="stylesheet" href="css/calculator.css">
</head>
<body>
  <header>
    <h1>Calculator</h1>
  </header>
  <div class="container">
    <div class="display-area">
      <p id="result">0</p>
    </div>
    <div class="input-area">
      <div class="numbers">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>0</button>
        <button>00</button>
        <button>.</button>
      </div>
      <div class="operators">
        <button>+</button>
        <button>-</button>
        <button>*</button>
        <button>/</button>
      </div>
      <div class="others">
        <button id="backspace">&#8592</button>
        <button id="clear">C</button>
        <button id="equal">=</button>
      </div>
    </div>
  </div>
  <script src="js/calculator.js"></script>
</body>
</html>
