<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="css/rock-paper-scissor.css">
</head>
<body>
    <div class="header">
        <h1>Rock Paper Scissor</h1>
    </div>
    <div class="container">
        <div class="comp-area">
            <p id="comp-text">Computer</p>
            <img src="img/rock.jpg" id="comp">
        </div>
        <div class="info-area">
            <p id="info-text">Info</p>          
        </div>
        <div class="player-area">
            <img src="img/rock.jpg" id="rock">
            <img src="img/paper.jpg" id="paper">
            <img src="img/scissor.jpg" id="scissor">
            <p id="player-text">Player</p>
        </div>
    </div>
    <script src="js/rock-paper-scissor.js"></script>
</body>
</html>
