<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="css/rock-paper-scissor.css">
</head>
<body>
    <header>
        <h1>Rock Paper Scissor</h1>
    </header>
    <div class="container">
        <div class="comp-area">
            <p id="comp-info">Computer</p>
            <img src="img/rps1.jpg" id="comp">
        </div>
        <div class="info-area">
            <p id="info-text">Info</p>          
        </div>
        <div class="player-area">
            <img src="img/rps1.jpg" id="player1">
            <img src="img/rps2.jpg" id="player2">
            <img src="img/rps3.jpg" id="player3">
            <p id="player-info">Player</p>
        </div>
    </div>
    <script src="js/rock-paper-scissor.js"></script>
</body>
</html>
