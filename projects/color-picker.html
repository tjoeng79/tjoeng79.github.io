<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker</title>
    <link rel="stylesheet" href="css/color-picker.css">
</head>
<body>
    <div class="header">
        <h1>Color Picker</h1>
    </div>
    <div class="container">
        <div class="color-area">
            <p class="info-text red">0</p>
            <input type="range" min="0" max="255" value="0" id="input-red">
        </div>
        <div class="color-area">
            <p class="info-text green">0</p>
            <input type="range" min="0" max="255" value="0" id="input-green">
        </div>
        <div class="color-area">
            <p class="info-text blue">0</p>
            <input type="range" min="0" max="255" value="0" id="input-blue">
        </div>
    </div>
    <script src="js/color-picker.js"></script>
</body>
</html>
