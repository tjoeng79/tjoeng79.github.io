<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker</title>
    <link rel="stylesheet" href="css/color-picker.css">
</head>
<body>
    <header>
        <h1>Color Picker</h1>
    </header>
    <div class="container">
        <div class="color-area">
            <p id="info-red">0</p>
            <input type="range" min="0" max="255" value="0" id="input-red">
            <p id="info-green">0</p>
            <input type="range" min="0" max="255" value="0" id="input-green">
            <p id="info-blue">0</p>
            <input type="range" min="0" max="255" value="0" id="input-blue">
        </div>
    </div>
    <script src="js/color-picker.js"></script>
</body>
</html>
